    function setRouteProfile(profile) {
      routeProfile = profile;
      ['car', 'foot', 'bicycle'].forEach(p => {
        document.getElementById(`prof-${p}`).classList.toggle('active', p === profile);
      });
      if (routeStart && routeEnd) fetchRoute();
    }

    function showRouteHint(msg) {
      document.getElementById('route-hint').textContent = msg;
      document.getElementById('route-dist').textContent = '';
      document.getElementById('route-time').textContent = '';
      document.getElementById('route-info').classList.add('visible');
    }

    function updateRouteMarkers() {
      if (startMarker) { startMarker.remove(); startMarker = null; }
      if (endMarker)   { endMarker.remove();   endMarker   = null; }

      if (routeStart) {
        const el = document.createElement('div');
        el.style.cssText = 'width:14px;height:14px;background:#34a853;border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.4)';
        startMarker = new maplibregl.Marker({ element: el })
          .setLngLat(routeStart).addTo(map);
      }
      if (routeEnd) {
        const el = document.createElement('div');
        el.style.cssText = 'width:14px;height:14px;background:#e53935;border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.4)';
        endMarker = new maplibregl.Marker({ element: el })
          .setLngLat(routeEnd).addTo(map);
      }
    }

    async function fetchRoute() {
      const coords = `${routeStart[0]},${routeStart[1]};${routeEnd[0]},${routeEnd[1]}`;
      const url = `${ROUTE_BASE}/route/v1/${routeProfile}/${coords}?overview=full&geometries=geojson`;
      document.getElementById('route-hint').textContent = 'Beregner rute…';
      document.getElementById('route-dist').textContent = '';
      document.getElementById('route-time').textContent = '';
      try {
        const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${ROUTE_API_KEY}` } });
        const data = await resp.json();
        if (data.code !== 'Ok' || !data.routes?.length) {
          document.getElementById('route-hint').textContent = 'Ingen rute fundet';
          return;
        }
        renderRoute(data.routes[0]);
      } catch (err) {
        document.getElementById('route-hint').textContent = 'Fejl ved ruteberegning';
        console.error('Route error:', err);
      }
    }

    function renderRoute(route) {
      const geom = { type: 'Feature', geometry: route.geometry };
      const src = map.getSource('route-line');
      if (src) {
        src.setData(geom);
      } else {
        map.addSource('route-line', { type: 'geojson', data: geom });
        const before = map.getLayer('drawn-poly-fill') ? 'drawn-poly-fill' : undefined;
        map.addLayer({ id: 'route-line-bg', type: 'line', source: 'route-line',
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: { 'line-color': '#fff', 'line-width': 8 }
        }, before);
        map.addLayer({ id: 'route-line-fg', type: 'line', source: 'route-line',
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: { 'line-color': '#4285f4', 'line-width': 5 }
        }, before);
      }

      const dist = route.distance >= 1000
        ? (route.distance / 1000).toFixed(1) + ' km'
        : Math.round(route.distance) + ' m';
      const secs = route.duration;
      const time = secs >= 3600
        ? `${Math.floor(secs / 3600)} t ${Math.round((secs % 3600) / 60)} min`
        : `${Math.round(secs / 60)} min`;

      document.getElementById('route-hint').textContent = '';
      document.getElementById('route-dist').textContent = dist;
      document.getElementById('route-time').textContent = time;
    }

    function clearRoute() {
      routeStart = null;
      routeEnd   = null;
      if (startMarker) { startMarker.remove(); startMarker = null; }
      if (endMarker)   { endMarker.remove();   endMarker   = null; }
      clearRouteDisplay();
      if (routeMode) showRouteHint('Klik for at vælge startpunkt');
      else document.getElementById('route-info').classList.remove('visible');
    }

    function clearRouteDisplay() {
      if (map.getLayer('route-line-fg')) map.removeLayer('route-line-fg');
      if (map.getLayer('route-line-bg')) map.removeLayer('route-line-bg');
      if (map.getSource('route-line'))   map.removeSource('route-line');
      document.getElementById('route-dist').textContent = '';
      document.getElementById('route-time').textContent = '';
      document.getElementById('route-info').classList.remove('visible');
    }

    // ── Måleværktøjer ─────────────────────────────────────────────────────────
    function startMeasure(mode) {
      if (measureMode === mode) { stopMeasure(); return; } // toggle off
      stopMeasure();
      measureMode     = mode;
      measureFinished = false;
      measurePoints   = [];

      // Deaktiver rute og tegning
      if (routeMode) toggleRouteMode();
      draw.changeMode('simple_select');
      currentMode = 'simple_select';
      updateActiveBtn('simple_select');
      deselect();

      map.doubleClickZoom.disable();
      map.getCanvas().style.cursor = 'crosshair';
      document.getElementById('btn-measure-dist').classList.toggle('active', mode === 'distance');
      document.getElementById('btn-measure-area').classList.toggle('active', mode === 'area');
      document.getElementById('measure-label-text').textContent = mode === 'distance' ? 'Afstand' : 'Areal';
      document.getElementById('measure-value').textContent = '—';
      document.getElementById('measure-hint').textContent = 'Klik for at tilføje startpunkt';
      document.getElementById('route-info').classList.remove('visible');
      document.getElementById('measure-info').classList.add('visible');
    }

    function stopMeasure() {
      measureMode     = null;
      measurePoints   = [];
      measureFinished = false;
      clearTimeout(measureClickTimer);
      map.doubleClickZoom.enable();
      map.getCanvas().style.cursor = '';
      document.getElementById('btn-measure-dist').classList.remove('active');
      document.getElementById('btn-measure-area').classList.remove('active');
      document.getElementById('measure-info').classList.remove('visible');
      clearMeasureSources();
    }

    function clearMeasureSources() {
      if (!map.getSource('measure-pts')) return;
      const empty = featureCollection([]);
      map.getSource('measure-pts').setData(empty);
      map.getSource('measure-line').setData(empty);
      map.getSource('measure-polygon').setData(empty);
      map.getSource('measure-rubber').setData(empty);
    }

    function finishMeasure() {
      if (!measureMode) return;
      if (measureMode === 'distance' && measurePoints.length < 2) { stopMeasure(); return; }
      if (measureMode === 'area'     && measurePoints.length < 3) { stopMeasure(); return; }
      measureFinished = true;
      map.getCanvas().style.cursor = '';
      map.getSource('measure-rubber').setData(featureCollection([]));
      document.getElementById('measure-hint').textContent = 'Klik "Ryd mål" for at starte forfra';
      updateMeasureDisplay();
    }

    function haversine(lng1, lat1, lng2, lat2) {
      const R = 6371000;
      const p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180;
      const dp = (lat2 - lat1) * Math.PI / 180;
      const dl = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function totalDistance(pts) {
      let d = 0;
      for (let i = 1; i < pts.length; i++) d += haversine(...pts[i-1], ...pts[i]);
      return d;
    }

    function sphericalArea(pts) {
      if (pts.length < 3) return 0;
      const R = 6371000;
      let area = 0;
      for (let i = 0; i < pts.length; i++) {
        const j = (i + 1) % pts.length;
        const lat1 = pts[i][1] * Math.PI / 180;
        const lat2 = pts[j][1] * Math.PI / 180;
        const dLng = (pts[j][0] - pts[i][0]) * Math.PI / 180;
        area += dLng * (2 + Math.sin(lat1) + Math.sin(lat2));
      }
      return Math.abs(area * R * R / 2);
    }

    function formatDistance(m) {
      return m >= 1000 ? (m / 1000).toFixed(2) + ' km' : Math.round(m) + ' m';
    }

    function formatArea(m2) {
      if (m2 >= 1e6)   return (m2 / 1e6).toFixed(2) + ' km²';
      if (m2 >= 10000) return (m2 / 10000).toFixed(2) + ' ha';
      return Math.round(m2) + ' m²';
    }

    function updateMeasureDisplay(mouseCoords) {
      if (!measureMode) return;

      // Byg punktliste inkl. mus-position (rubber band)
      const pts = measureFinished ? measurePoints.slice() : [...measurePoints, ...(mouseCoords && measurePoints.length > 0 ? [mouseCoords] : [])];

      // Opdater punktmarkers (kun faste punkter)
      map.getSource('measure-pts').setData(featureCollection(
        measurePoints.map(p => ({ type: 'Feature', geometry: { type: 'Point', coordinates: p }, properties: {} }))
      ));

      if (measureMode === 'distance') {
        map.getSource('measure-polygon').setData(featureCollection([]));
        map.getSource('measure-line').setData(
          pts.length >= 2
            ? { type: 'Feature', geometry: { type: 'LineString', coordinates: pts }, properties: {} }
            : featureCollection([])
        );
      } else { // area
        map.getSource('measure-line').setData(featureCollection([]));
        if (pts.length >= 3) {
          map.getSource('measure-polygon').setData({
            type: 'Feature',
            geometry: { type: 'Polygon', coordinates: [[...pts, pts[0]]] },
            properties: {}
          });
        } else {
          map.getSource('measure-polygon').setData(featureCollection([]));
          if (pts.length === 2) {
            map.getSource('measure-line').setData({
              type: 'Feature', geometry: { type: 'LineString', coordinates: pts }, properties: {}
            });
          }
        }
      }

      // Rubber band
      if (mouseCoords && measurePoints.length > 0 && !measureFinished) {
        map.getSource('measure-rubber').setData({
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: [measurePoints[measurePoints.length - 1], mouseCoords] },
          properties: {}
        });
      }

      // Opdater value-display
      const valueEl = document.getElementById('measure-value');
      const hintEl  = document.getElementById('measure-hint');

      if (measureMode === 'distance') {
        const d = pts.length >= 2 ? totalDistance(pts) : null;
        valueEl.textContent = d !== null ? formatDistance(d) : '—';
        if (!measureFinished) {
          hintEl.textContent = measurePoints.length >= 2
            ? 'Dobbeltklik for at afslutte · ESC for at annullere'
            : measurePoints.length === 1
              ? 'Klik for at tilføje næste punkt'
              : 'Klik for at tilføje startpunkt';
        }
      } else {
        const a = measurePoints.length >= 3 ? sphericalArea(measurePoints) : null;
        valueEl.textContent = a !== null ? formatArea(a) : '—';
        if (!measureFinished) {
          hintEl.textContent = measurePoints.length >= 3
            ? `${measurePoints.length} punkter · Dobbeltklik for at afslutte`
            : measurePoints.length === 0
              ? 'Klik for at tilføje startpunkt'
              : `${measurePoints.length} punkt${measurePoints.length > 1 ? 'er' : ''} · Tilføj flere`;
        }
      }
    }

    // ── PDF Udskrift ──────────────────────────────────────────────────────────
    const PAPER_DIMS = {
      a4: { portrait: [210, 297], landscape: [297, 210] },
      a3: { portrait: [297, 420], landscape: [420, 297] }
    };
    const PRINT_MARGIN = 10; // mm

    let printOpen        = false;
    let printPaper       = 'a4';
    let printOrientation = 'portrait';

    function getPrintAreaMm() {
      const [pw, ph] = PAPER_DIMS[printPaper][printOrientation];
      return { w: pw - 2 * PRINT_MARGIN, h: ph - 2 * PRINT_MARGIN };
    }

    function togglePrintPanel() {
      printOpen = !printOpen;
      document.getElementById('print-panel').classList.toggle('open', printOpen);
      document.getElementById('btn-print').classList.toggle('active', printOpen);
      document.getElementById('print-frame').style.display = printOpen ? 'block' : 'none';
      if (printOpen) {
        updatePrintFrame();
        applyPrintScale();
      }
    }

    function setPrintPaper(paper) {
      printPaper = paper;
      const btns = document.querySelectorAll('#paper-btns .profile-btn');
      btns[0].classList.toggle('active', paper === 'a4');
      btns[1].classList.toggle('active', paper === 'a3');
      updatePrintFrame();
      applyPrintScale();
    }

    function setPrintOrientation(ori) {
      printOrientation = ori;
      const btns = document.querySelectorAll('#ori-btns .profile-btn');
      btns[0].classList.toggle('active', ori === 'portrait');
      btns[1].classList.toggle('active', ori === 'landscape');
      updatePrintFrame();
      applyPrintScale();
    }

    function updatePrintFrame() {
      const area   = getPrintAreaMm();
      const aspect = area.w / area.h;
      const canvas = map.getCanvas();
      const maxW   = canvas.clientWidth  * 0.68;
      const maxH   = canvas.clientHeight * 0.74;

      let frameW, frameH;
      if (maxW / aspect <= maxH) {
        frameW = maxW;
        frameH = maxW / aspect;
      } else {
        frameH = maxH;
        frameW = maxH * aspect;
      }

      const frame = document.getElementById('print-frame');
      frame.style.width  = frameW + 'px';
      frame.style.height = frameH + 'px';

      // Opdater label
      const scale  = parseInt(document.getElementById('print-scale').value);
      const paper  = printPaper.toUpperCase();
      const ori    = printOrientation === 'portrait' ? 'stående' : 'liggende';
      document.getElementById('print-frame-label').textContent =
        `${paper} ${ori} · 1:${scale.toLocaleString('da-DK')}`;
    }

    // Beregn zoom ud fra målestok, breddegrad og rammestørrelse i pixels
    function scaleToZoom(scaleDenom, lat, framePxW, areaMmW) {
      const groundW_m = (areaMmW / 1000) * scaleDenom;
      const R   = 6378137;
      const C   = 2 * Math.PI * R * Math.cos(lat * Math.PI / 180) / 256;
      return Math.log2(framePxW * C / groundW_m);
    }

    function applyPrintScale() {
      const scale = parseInt(document.getElementById('print-scale').value);
      const lat   = map.getCenter().lat;
      const frame = document.getElementById('print-frame');
      const area  = getPrintAreaMm();
      const framePxW = parseFloat(frame.style.width) || frame.offsetWidth;
      if (!framePxW) return;
      const zoom = scaleToZoom(scale, lat, framePxW, area.w);
      map.setZoom(zoom);
      updatePrintFrame(); // opdater label
    }

    async function downloadPdf() {
      const btn = document.getElementById('print-dl-btn');
      btn.disabled = true;
      btn.textContent = 'Genererer…';

      // Vent til kortet er stille (alle tiles loadet)
      await new Promise(resolve => {
        if (!map.isMoving() && !map.isZooming()) resolve();
        else map.once('idle', resolve);
      });

      try {
        const { jsPDF } = window.jspdf;

        const area  = getPrintAreaMm();
        const scale = parseInt(document.getElementById('print-scale').value);
        const title = document.getElementById('print-title').value.trim();

        // Find frame-position relativt til map-canvas
        const mapCanvas = map.getCanvas();
        const mapRect   = mapCanvas.getBoundingClientRect();
        const frame     = document.getElementById('print-frame');
        const frameRect = frame.getBoundingClientRect();

        const dpr = window.devicePixelRatio || 1;
        const sx  = Math.round((frameRect.left - mapRect.left) * dpr);
        const sy  = Math.round((frameRect.top  - mapRect.top)  * dpr);
        const sw  = Math.round(frameRect.width  * dpr);
        const sh  = Math.round(frameRect.height * dpr);

        // Klip frame-region ud til temp canvas
        const tmp = document.createElement('canvas');
        tmp.width  = sw;
        tmp.height = sh;
        tmp.getContext('2d').drawImage(mapCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
        const imgData = tmp.toDataURL('image/jpeg', 0.93);

        // Opret PDF
        const [paperW, paperH] = PAPER_DIMS[printPaper][printOrientation];
        const ori = printOrientation === 'portrait' ? 'p' : 'l';
        const doc = new jsPDF({ orientation: ori, unit: 'mm', format: printPaper });

        const m = PRINT_MARGIN;

        // Kortbillede dækker hele printarealet
        doc.addImage(imgData, 'JPEG', m, m, area.w, area.h);

        // Titel (overlay øverst i kortbilledet)
        if (title) {
          doc.setFillColor(255, 255, 255);
          doc.setDrawColor(255, 255, 255);
          doc.roundedRect(m, m, area.w, 12, 1, 1, 'F');
          doc.setFontSize(13);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(30, 30, 30);
          doc.text(title, m + 4, m + 8);
        }

        // Footerinfo (målestok + dato)
        const footerY = m + area.h - 1;
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setFillColor(255, 255, 255);
        doc.setDrawColor(255, 255, 255);
        doc.roundedRect(m, footerY - 5, area.w, 7, 1, 1, 'F');
        doc.setTextColor(60, 60, 60);
        doc.text(`Målestok 1:${scale.toLocaleString('da-DK')}`, m + 2, footerY + 0.5);
        doc.text(new Date().toLocaleDateString('da-DK'), m + area.w - 2, footerY + 0.5, { align: 'right' });

        doc.save(`kort_1-${scale}.pdf`);
      } catch (err) {
        console.error('PDF fejl:', err);
        alert('PDF-generering fejlede. Se konsollen for detaljer.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF`;
      }
    }

    // Opdater printramme-label når kortet zoomer (mens panelet er åbent)
    map.on('zoom', () => {
      if (!printOpen) return;
      const frame = document.getElementById('print-frame');
      const scale  = parseInt(document.getElementById('print-scale').value);
      const paper  = printPaper.toUpperCase();
      const ori    = printOrientation === 'portrait' ? 'stående' : 'liggende';
      document.getElementById('print-frame-label').textContent =
        `${paper} ${ori} · 1:${scale.toLocaleString('da-DK')}`;
    });

    // ── Søgefelt ──────────────────────────────────────────────────────────────
    const REDATA_SERVICE = 'https://redata-postgrest.septima.dk';
    const REDATA_TOKEN   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoicHJvZF9yZWRhdGFfcmVhZCIsImV4cCI6MjI3ODEwMjc3MH0.o6wwzNNMk799XRho1xhODw35eDYkJcAjf61-RJzVkCo';

    // EPSG:25832 (UTM zone 32N) → WGS84
    function utm32toWGS84(east, north) {
      const a = 6378137, e2 = 0.00669437999014, k0 = 0.9996, lon0 = 9 * Math.PI / 180;
      const x = east - 500000, M = north / k0;
      const mu = M / (a * (1 - e2/4 - 3*e2*e2/64 - 5*e2*e2*e2/256));
      const e1 = (1 - Math.sqrt(1-e2)) / (1 + Math.sqrt(1-e2));
      const p1 = mu + (3*e1/2 - 27*e1**3/32)*Math.sin(2*mu) + (21*e1**2/16 - 55*e1**4/32)*Math.sin(4*mu)
               + 151*e1**3/96*Math.sin(6*mu) + 1097*e1**4/512*Math.sin(8*mu);
      const N1 = a/Math.sqrt(1 - e2*Math.sin(p1)**2);
      const T1 = Math.tan(p1)**2, C1 = e2*Math.cos(p1)**2/(1-e2);
      const R1 = a*(1-e2)/Math.pow(1-e2*Math.sin(p1)**2, 1.5);
      const D  = x/(N1*k0);
      const lat = p1 - N1*Math.tan(p1)/R1*(D**2/2 - (5+3*T1+10*C1-4*C1**2-9*e2)*D**4/24
                + (61+90*T1+298*C1+45*T1**2-252*e2-3*C1**2)*D**6/720);
      const lng = lon0 + (D - (1+2*T1+C1)*D**3/6 + (5-2*C1+28*T1-3*C1**2+8*e2+24*T1**2)*D**5/120)/Math.cos(p1);
      return [lng*180/Math.PI, lat*180/Math.PI];
    }

    let searchTimer   = null;
    let searchResults = [];
    let searchActive  = -1;

    function onSearchInput(value) {
      document.getElementById('search-clear').style.display = value ? 'block' : 'none';
      clearTimeout(searchTimer);
      if (!value.trim()) { closeSearch(); return; }
      searchTimer = setTimeout(() => doSearch(value.trim()), 220);
    }

    async function doSearch(q) {
      const enc = encodeURIComponent(q);
      try {
        const [addrResp, stedResp, cvrResp] = await Promise.all([
          fetch(`https://api.dataforsyningen.dk/adresser/autocomplete?q=${enc}&per_side=5`),
          fetch(`https://api.dataforsyningen.dk/stednavne2/autocomplete?q=${enc}&per_side=3`),
          fetch(`${REDATA_SERVICE}/virksomhed?navn=ilike.${enc}*&limit=5&select=cvrnummer,navn,adresse,geometri,sammensatstatus`,
            { headers: { 'Authorization': `Bearer ${REDATA_TOKEN}` } })
        ]);
        const [addrData, stedData, cvrData] = await Promise.all([
          addrResp.json(), stedResp.json(), cvrResp.json()
        ]);

        searchResults = [];
        searchActive  = -1;

        // Adresser
        addrData.forEach(item => searchResults.push({
          label: item.tekst,
          type:  'adresse',
          lng:   item.adresse.x,
          lat:   item.adresse.y,
          zoom:  17
        }));

        // Stednavne
        stedData.forEach(item => {
          const geom = item.stednavn?.visueltcenter || item.stednavn?.bbox;
          if (!geom) return;
          searchResults.push({ label: item.tekst || item.stednavn?.navn, type: 'sted', lng: geom[0], lat: geom[1], zoom: 13 });
        });

        // Virksomheder (koordinater fra EPSG:25832)
        if (Array.isArray(cvrData)) {
          cvrData.forEach(v => {
            const coords = v.geometri?.coordinates;
            if (!coords) return;
            const [lng, lat] = utm32toWGS84(coords[0], coords[1]);
            searchResults.push({
              label:   v.navn,
              sub:     v.adresse,
              type:    'virksomhed',
              aktiv:   v.sammensatstatus === 'Normal',
              cvr:     v.cvrnummer,
              lng, lat, zoom: 16
            });
          });
        }

        renderSearchResults();
      } catch (err) {
        console.error('Søgefejl:', err);
      }
    }

    function renderSearchResults() {
      const box = document.getElementById('search-results');
      if (!searchResults.length) {
        box.innerHTML = '<div class="search-no-results">Ingen resultater</div>';
        box.style.display = 'block';
        return;
      }

      const icons = {
        adresse:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
        sted:       `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
        virksomhed: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>`
      };

      const groups = ['adresse', 'sted', 'virksomhed'];
      const labels = { adresse: 'Adresser', sted: 'Stednavne', virksomhed: 'Virksomheder' };

      let html = '';
      let lastType = null;
      searchResults.forEach((r, i) => {
        if (r.type !== lastType) {
          html += `<div class="search-group-label">${labels[r.type]}</div>`;
          lastType = r.type;
        }
        const inaktiv = r.type === 'virksomhed' && !r.aktiv
          ? ' <span style="font-size:10px;color:#e57373;margin-left:4px">ophørt</span>' : '';
        const sub = r.sub ? `<span class="search-result-sub">${escHtml(r.sub)}</span>` : '';
        html += `<div class="search-result-item" data-idx="${i}" onclick="selectSearchResult(${i})">
          ${icons[r.type]}<span>${escHtml(r.label)}${inaktiv}</span>${sub}</div>`;
      });

      box.innerHTML = html;
      box.style.display = 'block';
    }

    function selectSearchResult(idx) {
      const r = searchResults[idx];
      if (!r) return;
      map.flyTo({ center: [r.lng, r.lat], zoom: r.zoom, speed: 1.6 });
      document.getElementById('search-input').value = r.label;
      closeSearch();
    }

    function closeSearch() {
      document.getElementById('search-results').style.display = 'none';
      searchResults = [];
      searchActive  = -1;
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear').style.display = 'none';
      closeSearch();
    }

    function onSearchKeydown(e) {
      const items = document.querySelectorAll('.search-result-item');
      if (!items.length) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        searchActive = Math.min(searchActive + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === searchActive));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        searchActive = Math.max(searchActive - 1, 0);
        items.forEach((el, i) => el.classList.toggle('active', i === searchActive));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (searchActive >= 0) selectSearchResult(searchActive);
        else if (searchResults.length) selectSearchResult(0);
      } else if (e.key === 'Escape') {
        closeSearch();
        document.getElementById('search-input').blur();
      }
    }

    // Luk dropdown ved klik udenfor søgefeltet
    document.addEventListener('click', e => {
      if (!document.getElementById('search-box').contains(e.target)) closeSearch();
    });

    // ESC: annuller aktiv måling
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && measureMode) stopMeasure();
    });

    // ── WMS GetFeatureInfo ─────────────────────────────────────────────────────
    function lngToMercX(lng) { return lng * Math.PI / 180 * 6378137; }
    function latToMercY(lat) { return Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360)) * 6378137; }

    async function queryWmsAtPoint(lngLat, point) {
      if (!addedWmsLayers.size) return;

      if (wmsPopup) { wmsPopup.remove(); wmsPopup = null; }

      const canvas  = map.getCanvas();
      const W = canvas.clientWidth, H = canvas.clientHeight;
      const bounds  = map.getBounds();
      const bbox = [
        lngToMercX(bounds.getWest()),  latToMercY(bounds.getSouth()),
        lngToMercX(bounds.getEast()),  latToMercY(bounds.getNorth())
      ].join(',');
      const I = Math.round(point.x), J = Math.round(point.y);

      const results = [];

      await Promise.all(Array.from(addedWmsLayers.entries()).map(async ([datasetId, { lyrId }]) => {
        const wms = catalogDatasetWms.get(datasetId);
        if (!wms) return;
        const version   = wms.version || '1.3.0';
        const crsParam  = version.startsWith('1.3') ? 'CRS' : 'SRS';
        const url = `${wms.url}?SERVICE=WMS&VERSION=${version}&REQUEST=GetFeatureInfo`
          + `&LAYERS=${encodeURIComponent(wms.layer)}&QUERY_LAYERS=${encodeURIComponent(wms.layer)}`
          + `&INFO_FORMAT=${encodeURIComponent('application/json')}`
          + `&FEATURE_COUNT=5&I=${I}&J=${J}&WIDTH=${W}&HEIGHT=${H}`
          + `&BBOX=${bbox}&${crsParam}=EPSG:3857&STYLES=`;
        try {
          const resp = await fetch(url);
          if (!resp.ok) return;
          const ct   = resp.headers.get('content-type') || '';
          let features = [];
          if (ct.includes('json')) {
            const json = await resp.json();
            features = json.features || [];
          }
          if (features.length > 0) {
            const layerTitle = document.querySelector(`#cat-${datasetId} .cat-title`)?.textContent || wms.layer;
            results.push({ title: layerTitle, features });
          }
        } catch { /* ignore CORS / network errors */ }
      }));

      if (!results.length) return;

      const SKIP = /^(geom|geometry|wkt|shape|the_geom|gml_id|boundedby)$/i;
      let body = '';
      results.forEach(({ title, features }) => {
        body += `<div class="wms-popup-layer"><div class="wms-popup-layer-title">${escHtml(title)}</div>`;
        features.forEach(f => {
          const props = f.properties || {};
          const rows = Object.entries(props)
            .filter(([k, v]) => !SKIP.test(k) && v !== null && v !== '')
            .map(([k, v]) => `<tr><td>${escHtml(String(k))}</td><td>${escHtml(String(v))}</td></tr>`)
            .join('');
          if (rows) body += `<table class="wms-attr-table">${rows}</table>`;
        });
        body += '</div>';
      });

      const html = `<div class="wms-popup-header">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Attributter
      </div><div class="wms-popup-body">${body}</div>`;

      wmsPopup = new maplibregl.Popup({ maxWidth: '320px', closeOnClick: true })
        .setLngLat(lngLat)
        .setHTML(html)
        .addTo(map);
      wmsPopup.on('close', () => { wmsPopup = null; });
    }
    // ── Layout-vælger ─────────────────────────────────────────────────────────
    function setLayout(name) {
      document.body.dataset.layout = name;
      localStorage.setItem('mapLayout', name);
      document.querySelectorAll('.layout-opt').forEach(el => {
        el.classList.toggle('active', el.dataset.layout === name);
      });
      document.getElementById('layout-panel').classList.remove('open');
      document.getElementById('layout-btn').classList.remove('active');
    }

    function toggleLayoutPicker() {
      const panel = document.getElementById('layout-panel');
      const btn   = document.getElementById('layout-btn');
      const open  = panel.classList.toggle('open');
      btn.classList.toggle('active', open);
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('#layout-btn') && !e.target.closest('#layout-panel')) {
        document.getElementById('layout-panel').classList.remove('open');
        document.getElementById('layout-btn').classList.remove('active');
      }
    });

    // Sæt layout synkront for at undgå flash — active-klasser sættes i DOMContentLoaded
    const _savedLayout = localStorage.getItem('mapLayout') || 'sidebar';
    document.body.dataset.layout = _savedLayout;
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.layout-opt').forEach(el => {
        el.classList.toggle('active', el.dataset.layout === _savedLayout);
      });
    });
  </script>
